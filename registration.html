<!DOCTYPE html>
<html>
<head>
    <title>Student Registration Form</title>
</head>

<body>

<h1 align="center">STUDENT REGISTRATION FORM</h1>

<form>

<table align="center" cellpadding="10" cellspacing="8">

<tr>
    <td><b>Full Name</b></td>
    <td>:</td>
    <td><input type="text" name="fullname" size="35" placeholder="Enter your full name"></td>
</tr>

<tr>
    <td><b>Password</b></td>
    <td>:</td>
    <td><input type="password" name="password" size="35" placeholder="Enter password"></td>
</tr>

<tr>
    <td><b>Email ID</b></td>
    <td>:</td>
    <td><input type="email" name="email" size="35" placeholder="Enter your email"></td>
</tr>

<tr>
    <td><b>Phone Number</b></td>
    <td>:</td>
    <td><input type="tel" name="phone" size="35" placeholder="Enter phone number"></td>
</tr>

<tr>
    <td><b>Address</b></td>
    <td>:</td>
    <td>
        <textarea name="address" rows="5" cols="37" placeholder="Enter your address"></textarea>
    </td>
</tr>

<tr>
    <td><b>Gender</b></td>
    <td>:</td>
    <td>
        <input type="radio" name="gender" value="Male"> Male
        &nbsp;&nbsp;&nbsp;
        <input type="radio" name="gender" value="Female"> Female
        &nbsp;&nbsp;&nbsp;
        <input type="radio" name="gender" value="Other"> Other
    </td>
</tr>

<tr>
    <td><b>Languages Known</b></td>
    <td>:</td>
    <td>
        <input type="checkbox" name="language" value="English"> English
        &nbsp;&nbsp;
        <input type="checkbox" name="language" value="Tamil"> Tamil
        &nbsp;&nbsp;
        <input type="checkbox" name="language" value="Hindi"> Hindi
    </td>
</tr>

<tr>
    <td><b>Department</b></td>
    <td>:</td>
    <td>
        <select name="department">
            <option>-- Select Department --</option>
            <option>B.Sc Computer Science</option>
            <option>B.Sc Information Technology</option>
            <option>BCA</option>
            <option>B.Com</option>
            <option>BBA</option>
        </select>
    </td>
</tr>

<tr>
    <td><b>Upload Photo</b></td>
    <td>:</td>
    <td><input type="file" name="photo"></td>
</tr>

<tr>
    <td colspan="3" align="center">
        <br>
        <input type="submit" value="Submit">
        &nbsp;&nbsp;&nbsp;
        <input type="reset" value="Reset">
        &nbsp;&nbsp;&nbsp;
        <input type="button" value="Click Me">
    </td>
</tr>

</table>

</form>

</body>
</html>
